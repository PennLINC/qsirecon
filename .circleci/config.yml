version: 2.1
orbs:
  codecov: codecov/codecov@4.1.0

# ── Reusable anchors ──────────────────────────────────────────────────

_machine_defaults: &machine_defaults
  environment:
    TZ: "/usr/share/zoneinfo/America/New_York"
  machine:
    image: default
    docker_layer_caching: true
  working_directory: /tmp/src/qsirecon
  resource_class: large

_docker_auth: &docker_auth
  name: Docker authentication
  command: |
    if [[ -n "$DOCKERHUB_TOKEN" ]]; then
      echo "$DOCKERHUB_TOKEN" | docker login -u $DOCKERHUB_USERNAME --password-stdin
    fi

_setup_docker_registry: &setup_docker_registry
  name: Set up local Docker registry
  command: |
    if [[ -f /tmp/images/registry.tar.gz ]]; then
      echo "Loading saved registry image"
      docker load < /tmp/images/registry.tar.gz
    else
      echo "Pulling registry image from DockerHub"
      docker pull registry:2
    fi
    docker run -d -p 5000:5000 --restart=always --name=registry \
        -v /tmp/docker:/var/lib/registry registry:2

_pull_test_image: &pull_test_image
  name: Pull and tag test image from local registry
  command: |
    docker pull localhost:5000/qsirecon-test
    docker tag localhost:5000/qsirecon-test pennlinc/qsirecon:test

# ── Reusable commands ─────────────────────────────────────────────────

commands:
  restore_build_and_data:
    description: Restore Docker image cache and test data cache, then start the registry
    steps:
      - restore_cache:
          keys:
            - build-v4-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}-{{ .Revision }}
            - build-v3-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}
      - restore_cache:
          keys:
            - data-v2-{{ .Branch }}-{{ .Revision }}
      - run: *docker_auth
      - run: *setup_docker_registry
      - run: *pull_test_image

  run_integration_test:
    description: Run a pytest-marked integration test inside the test Docker image
    parameters:
      marker:
        type: string
      cpus:
        type: integer
        default: 4
    steps:
      - run:
          name: Run qsirecon (<< parameters.marker >>)
          no_output_timeout: 5h
          command: |
            mkdir -p /tmp/out /tmp/work /tmp/coverage
            docker run --rm=false \
              -e CIRCLE_CPUS=<< parameters.cpus >> \
              -e COVERAGE_FILE=/coverage/.coverage.<< parameters.marker >> \
              -v /tmp/src/qsirecon:/tmp/src/qsirecon:ro \
              -v /tmp/data:/data:ro \
              -v /tmp/out:/out \
              -v /tmp/work:/work \
              -v /tmp/coverage:/coverage \
              -w /tmp/src/qsirecon \
              --entrypoint pytest \
              pennlinc/qsirecon:test \
              -rP -o log_cli=true -m "<< parameters.marker >>" \
              --cov-append --cov-report term-missing --cov=qsirecon \
              --data_dir=/data --output_dir=/out --working_dir=/work \
              qsirecon
      - run:
          name: Clean up large artifacts
          when: always
          command: find /tmp/out/ -name "*.nii.gz" -type f -delete 2>/dev/null || true
      - store_artifacts:
          path: /tmp/out
      - persist_to_workspace:
          root: /tmp/coverage
          paths:
            - .coverage.<< parameters.marker >>

# ── Jobs ──────────────────────────────────────────────────────────────

jobs:
  image_prep:
    <<: *machine_defaults
    environment:
      TZ: "/usr/share/zoneinfo/America/New_York"
      DOCKER_BUILDKIT: "1"
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_cache:
          keys:
            - build-v4-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}-{{ .Revision }}
            - build-v3-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}
      - run: *docker_auth
      - run: *setup_docker_registry
      - run:
          name: Get base image information
          command: |
            export BASE_IMAGE=$( grep "BASE_IMAGE=" Dockerfile | head -1 | cut -d= -f2 )
            export BASE_IMAGE_NAME=${BASE_IMAGE%:*}
            export BASE_TAG=${BASE_IMAGE#*:}
            echo "BASE_IMAGE=$BASE_IMAGE" >> $BASH_ENV
            echo "BASE_IMAGE_NAME=$BASE_IMAGE_NAME" >> $BASH_ENV
            echo "BASE_TAG=$BASE_TAG" >> $BASH_ENV
      - run:
          name: Determine whether test image build is required
          command: |
            if [[ -f /tmp/images/imageprep-success.marker ]]; then
              echo "BUILD_TEST_IMAGE=0" >> "$BASH_ENV"
            else
              echo "No successful cached image prep for current Docker inputs; rebuilding test image."
              echo "BUILD_TEST_IMAGE=1" >> "$BASH_ENV"
            fi
      - run:
          name: Build base image if needed
          no_output_timeout: 90m
          command: |
            if ! docker manifest inspect $BASE_IMAGE > /dev/null 2>&1; then
              echo "Base image $BASE_IMAGE not found, building..."
              docker build -f Dockerfile.base \
                --platform linux/amd64 \
                -t $BASE_IMAGE \
                -t $BASE_IMAGE_NAME:latest .
              echo "BASE_WAS_BUILT=1" >> "$BASH_ENV"
            else
              echo "Base image $BASE_IMAGE already exists."
              echo "BASE_WAS_BUILT=0" >> "$BASH_ENV"
            fi
      - run:
          name: Build Docker image (test)
          no_output_timeout: 90m
          command: |
            if [[ "$BUILD_TEST_IMAGE" == "1" || "$BASE_WAS_BUILT" == "1" ]]; then
              docker build \
                --target test \
                --rm=false \
                -t pennlinc/qsirecon:test \
                --platform linux/amd64 \
                --build-arg VCS_REF="$(git rev-parse --short HEAD)" .
            elif docker image inspect pennlinc/qsirecon:test > /dev/null 2>&1; then
              echo "Reusing existing local test image (no Dockerfile/pixi/base-triggered rebuild required)."
            elif docker pull localhost:5000/qsirecon-test; then
              docker tag localhost:5000/qsirecon-test pennlinc/qsirecon:test
              echo "Reusing cached test image from local registry (no Dockerfile/pixi/base-triggered rebuild required)."
            else
              echo "No reusable test image found; rebuilding test image."
              docker build \
                --target test \
                --rm=false \
                -t pennlinc/qsirecon:test \
                --platform linux/amd64 \
                --build-arg VCS_REF="$(git rev-parse --short HEAD)" .
            fi
      - run:
          name: Guard test image revision
          command: |
            EXPECTED_REF="$(git rev-parse --short HEAD)"
            IMAGE_REF="$(docker image inspect pennlinc/qsirecon:test --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
            echo "Expected test image ref: ${EXPECTED_REF}"
            echo "Actual test image ref: ${IMAGE_REF:-<missing>}"
            if [[ -z "$IMAGE_REF" || "$IMAGE_REF" != "$EXPECTED_REF" ]]; then
              echo "Test image revision does not match checkout. Refusing to run tests with stale image."
              exit 1
            fi
      - run:
          name: Verify test image
          command: docker run --rm --entrypoint pytest pennlinc/qsirecon:test --version
      - run:
          name: Push base image to Docker Hub (if newly built)
          command: |
            if [[ "$BASE_WAS_BUILT" == "1" ]] && docker image inspect $BASE_IMAGE > /dev/null 2>&1; then
              if [[ -n "$DOCKERHUB_TOKEN" ]]; then
                docker push $BASE_IMAGE
                docker push $BASE_IMAGE_NAME:latest
              fi
            fi
      - run:
          name: Push test image to local registry
          no_output_timeout: 40m
          command: |
            docker tag pennlinc/qsirecon:test localhost:5000/qsirecon-test
            docker push localhost:5000/qsirecon-test
      - run:
          name: Docker registry garbage collection
          command: |
            docker exec registry /bin/registry garbage-collect --delete-untagged \
              /etc/docker/registry/config.yml
      - run:
          name: Record successful image prep
          command: |
            mkdir -p /tmp/images
            touch /tmp/images/imageprep-success.marker
            docker save registry:2 -o /tmp/images/registry.tar.gz
      - save_cache:
          key: build-v4-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}-{{ .Revision }}
          paths:
            - /tmp/docker
            - /tmp/images

  get_data:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_cache:
          keys:
            - data-v2-{{ .Branch }}-{{ .Revision }}
            - data-v2--{{ .Revision }}
            - data-v2-{{ .Branch }}-
            - data-v2-main-
            - data-v2-
      - run:
          name: Download integration datasets
          command: |
            cd /tmp/src/qsirecon/.circleci
            mkdir -p /tmp/data
            python get_data.py /tmp/data singleshell_output
            python get_data.py /tmp/data multishell_output
            python get_data.py /tmp/data multises_pre1_output
            python get_data.py /tmp/data multises_post1_output
            python get_data.py /tmp/data hsvs_data
            python get_data.py /tmp/data custom_atlases
      - save_cache:
          key: data-v2-{{ .Branch }}-{{ .Revision }}
          paths:
            - /tmp/data

  # ── Integration tests ────────────────────────────────────────────────

  integration_test:
    <<: *machine_defaults
    parameters:
      marker:
        type: string
      cpus:
        type: integer
        default: 4
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - run:
          name: Check whether build should be skipped
          command: |
            if [[ "$( git log --format=oneline -n 1 $CIRCLE_SHA1 | grep -i -E '\[skip[ _]?<< parameters.marker >>\]' )" != "" ]]; then
              echo "Skipping << parameters.marker >>"
              circleci step halt
            fi
      - restore_build_and_data
      - run_integration_test:
          marker: << parameters.marker >>
          cpus: << parameters.cpus >>

  # ── Coverage & deployment ────────────────────────────────────────────

  merge_coverage:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - attach_workspace:
          at: /tmp/coverage
      - run:
          name: Merge coverage files
          command: |
            pyenv local 3
            pip install coverage
            cd /tmp/src/qsirecon
            coverage combine /tmp/coverage/
            coverage xml -o /tmp/coverage/coverage.xml
      - store_artifacts:
          path: /tmp/coverage
      - run:
          name: Quick fix for GPG error in Codecov
          command: mkdir -p ~/.gnupg
      - codecov/upload:
          file: /tmp/coverage/coverage.xml

  build_and_deploy_docker:
    <<: *machine_defaults
    environment:
      TZ: "/usr/share/zoneinfo/America/New_York"
      DOCKER_BUILDKIT: "1"
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - run: *docker_auth
      - run:
          name: Build Docker image (production)
          no_output_timeout: 3h
          command: |
            if [[ -n "$CIRCLE_TAG" ]]; then
              THISVERSION="$CIRCLE_TAG"
            else
              THISVERSION="0+build"
            fi
            e=1 && for i in {1..5}; do
              docker build \
                --target qsirecon \
                --rm=false \
                -t pennlinc/qsirecon:latest \
                --platform linux/amd64 \
                --build-arg BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
                --build-arg VCS_REF="$(git rev-parse --short HEAD)" \
                --build-arg VERSION="$THISVERSION" . \
              && e=0 && break || sleep 15
            done && [ "$e" -eq "0" ]
      - run:
          name: Verify production image
          command: docker run --rm pennlinc/qsirecon:latest --version
      - run:
          name: Deploy to Docker Hub
          no_output_timeout: 40m
          command: |
            if [[ -n "$DOCKERHUB_TOKEN" ]]; then
              docker tag pennlinc/qsirecon:latest pennlinc/qsirecon:unstable
              docker push pennlinc/qsirecon:unstable
              if [[ -n "$CIRCLE_TAG" ]]; then
                docker tag pennlinc/qsirecon:latest pennlinc/qsirecon:$CIRCLE_TAG
                docker push pennlinc/qsirecon:latest
                docker push pennlinc/qsirecon:$CIRCLE_TAG
              fi
            fi

# ── Workflows ─────────────────────────────────────────────────────────

