version: 2.1
orbs:
  codecov: codecov/codecov@4.1.0

_machine_defaults: &machine_defaults
  environment:
    TZ: "/usr/share/zoneinfo/America/New_York"
  machine:
    image: default
    docker_layer_caching: true
  working_directory: /tmp/src/qsirecon
  resource_class: large

_docker_auth: &docker_auth
  name: Docker authentication
  command: |
    if [[ -n "$DOCKERHUB_TOKEN" ]]; then
      echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    fi

_setup_docker_registry: &setup_docker_registry
  name: Set up local Docker registry
  command: |
    if [[ -f /tmp/images/registry.tar.gz ]]; then
      docker load < /tmp/images/registry.tar.gz
    else
      docker pull registry:2
    fi
    docker run -d -p 5000:5000 --restart=always --name=registry \
      -v /tmp/docker:/var/lib/registry registry:2

_pull_test_image: &pull_test_image
  name: Pull and tag test image from local registry
  command: |
    docker pull localhost:5000/qsirecon-test
    docker tag localhost:5000/qsirecon-test pennlinc/qsirecon:test

commands:
  restore_build_and_data:
    description: Restore Docker build cache and test data cache
    steps:
      - restore_cache:
          keys:
            - build-v4-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}-{{ .Revision }}
      - restore_cache:
          keys:
            - data-v1-{{ .Branch }}-{{ .Revision }}
            - data-v1--{{ .Revision }}
            - data-v1-{{ .Branch }}-
            - data-v1-main-
            - data-v1-
      - run: *docker_auth
      - run: *setup_docker_registry
      - run: *pull_test_image

  run_integration_test:
    description: Run a pytest marker inside test image
    parameters:
      marker:
        type: string
      cpus:
        type: integer
        default: 4
      coverage_name:
        type: string
    steps:
      - run:
          name: Run qsirecon (<< parameters.marker >>)
          no_output_timeout: 5h
          command: |
            mkdir -p /tmp/out /tmp/work /tmp/coverage
            docker run --rm=false \
              -e CIRCLE_CPUS=<< parameters.cpus >> \
              -e COVERAGE_FILE=/coverage/.coverage.<< parameters.coverage_name >> \
              -v /tmp/src/qsirecon:/tmp/src/qsirecon:ro \
              -v /tmp/data:/data:ro \
              -v /tmp/out:/out \
              -v /tmp/work:/work \
              -v /tmp/coverage:/coverage \
              -w /tmp/src/qsirecon \
              --entrypoint pytest \
              pennlinc/qsirecon:test \
              -rP -o log_cli=true -m "<< parameters.marker >>" \
              --cov-append --cov-report term-missing --cov=qsirecon \
              --data_dir=/data --output_dir=/out --working_dir=/work \
              qsirecon
      - run:
          name: Clean large artifacts
          when: always
          command: |
            find /tmp/out/ -name "*.nii.gz" -type f -delete 2>/dev/null || true
            find /tmp/out/ -name "*.fib.gz" -type f -delete 2>/dev/null || true
      - store_artifacts:
          path: /tmp/out
      - persist_to_workspace:
          root: /tmp/coverage
          paths:
            - .coverage.<< parameters.coverage_name >>

jobs:
  image_prep:
    <<: *machine_defaults
    environment:
      TZ: "/usr/share/zoneinfo/America/New_York"
      DOCKER_BUILDKIT: "1"
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_cache:
          keys:
            - build-v4-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}-{{ .Revision }}
      - run: *docker_auth
      - run: *setup_docker_registry
      - run:
          name: Get base image information
          command: |
            export BASE_IMAGE=$( grep "BASE_IMAGE=" Dockerfile | head -1 | cut -d= -f2 )
            export BASE_IMAGE_NAME=${BASE_IMAGE%:*}
            export BASE_TAG=${BASE_IMAGE#*:}
            echo "BASE_IMAGE=$BASE_IMAGE" >> "$BASH_ENV"
            echo "BASE_IMAGE_NAME=$BASE_IMAGE_NAME" >> "$BASH_ENV"
            echo "BASE_TAG=$BASE_TAG" >> "$BASH_ENV"
      - run:
          name: Determine whether test image build is required
          command: |
            if [[ -f /tmp/images/imageprep-success.marker ]]; then
              echo "BUILD_TEST_IMAGE=0" >> "$BASH_ENV"
            else
              echo "No successful cached image prep for current Docker inputs; rebuilding test image."
              echo "BUILD_TEST_IMAGE=1" >> "$BASH_ENV"
            fi
      - run:
          name: Build base image if needed
          no_output_timeout: 90m
          command: |
            if ! docker manifest inspect "$BASE_IMAGE" > /dev/null 2>&1; then
              docker build -f Dockerfile.base \
                --platform linux/amd64 \
                -t "$BASE_IMAGE" \
                -t "$BASE_IMAGE_NAME:latest" .
              echo "BASE_WAS_BUILT=1" >> "$BASH_ENV"
            else
              echo "BASE_WAS_BUILT=0" >> "$BASH_ENV"
            fi
      - run:
          name: Build test image
          no_output_timeout: 90m
          command: |
            if [[ "$BUILD_TEST_IMAGE" == "1" || "$BASE_WAS_BUILT" == "1" ]]; then
              docker build \
                --target test \
                --rm=false \
                -t pennlinc/qsirecon:test \
                --platform linux/amd64 \
                --build-arg VCS_REF="$(git rev-parse --short HEAD)" .
            elif docker image inspect pennlinc/qsirecon:test > /dev/null 2>&1; then
              echo "Reusing local test image."
            elif docker pull localhost:5000/qsirecon-test; then
              docker tag localhost:5000/qsirecon-test pennlinc/qsirecon:test
            else
              docker build \
                --target test \
                --rm=false \
                -t pennlinc/qsirecon:test \
                --platform linux/amd64 \
                --build-arg VCS_REF="$(git rev-parse --short HEAD)" .
            fi
      - run:
          name: Guard test image revision
          command: |
            EXPECTED_REF="$(git rev-parse --short HEAD)"
            IMAGE_REF="$(docker image inspect pennlinc/qsirecon:test --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
            echo "Expected test image ref: ${EXPECTED_REF}"
            echo "Actual test image ref: ${IMAGE_REF:-<missing>}"
            if [[ -z "$IMAGE_REF" || "$IMAGE_REF" != "$EXPECTED_REF" ]]; then
              echo "Test image revision does not match checkout. Refusing to run tests with stale image."
              exit 1
            fi
      - run:
          name: Verify test image
          command: docker run --rm --entrypoint pytest pennlinc/qsirecon:test --version
      - run:
          name: Push base image if newly built
          command: |
            if [[ "$BASE_WAS_BUILT" == "1" ]] && docker image inspect "$BASE_IMAGE" > /dev/null 2>&1; then
              if [[ -n "$DOCKERHUB_TOKEN" ]]; then
                docker push "$BASE_IMAGE"
                docker push "$BASE_IMAGE_NAME:latest"
              fi
            fi
      - run:
          name: Push test image to local registry
          no_output_timeout: 40m
          command: |
            docker tag pennlinc/qsirecon:test localhost:5000/qsirecon-test
            docker push localhost:5000/qsirecon-test
      - run:
          name: Docker registry garbage collection
          command: docker exec registry /bin/registry garbage-collect --delete-untagged /etc/docker/registry/config.yml
      - run:
          name: Record successful image prep
          command: |
            mkdir -p /tmp/images
            touch /tmp/images/imageprep-success.marker
            docker save registry:2 -o /tmp/images/registry.tar.gz
      - save_cache:
          key: build-v4-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}-{{ .Revision }}
          paths:
            - /tmp/docker
            - /tmp/images

  get_data:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_cache:
          keys:
            - data-v1-{{ .Branch }}-{{ .Revision }}
            - data-v1--{{ .Revision }}
            - data-v1-{{ .Branch }}-
            - data-v1-main-
            - data-v1-
      - run:
          name: Download integration datasets
          command: |
            cd /tmp/src/qsirecon/.circleci
            mkdir -p /tmp/data
            python get_data.py /tmp/data singleshell_output
            python get_data.py /tmp/data multishell_output
            python get_data.py /tmp/data multises_pre1_output
            python get_data.py /tmp/data multises_post1_output
            python get_data.py /tmp/data hsvs_data
            python get_data.py /tmp/data custom_atlases
      - save_cache:
          key: data-v1-{{ .Branch }}-{{ .Revision }}
          paths:
            - /tmp/data

  Recon_3Tissue_Singleshell_ACT:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: mrtrix_singleshell_ss3t_act
          coverage_name: mrtrix_singleshell_ss3t_act

  Recon_SS3T_FOD_AutoTrack:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: ss3t_fod_autotrack
          coverage_name: ss3t_fod_autotrack

  Recon_msmt_Multishell_HSVS:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: mrtrix_multishell_msmt_hsvs
          coverage_name: mrtrix_multishell_msmt_hsvs

  Recon_multises_pre1_IO_test:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: multises_pre1_qsiprep
          coverage_name: multises_pre1_qsiprep

  Recon_multises_post1_IO_test:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: multises_post1_qsiprep
          coverage_name: multises_post1_qsiprep

  Recon_3Tissue_Singleshell_NoACT:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: mrtrix_singleshell_ss3t_noact
          coverage_name: mrtrix_singleshell_ss3t_noact

  Recon_MRtrix3:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: mrtrix3_recon
          coverage_name: mrtrix3_recon

  Recon_Interfaces:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: interfaces
          coverage_name: recon_interfaces

  Recon_AutoTrack:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: autotrack
          coverage_name: autotrack

  Recon_Tortoise:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: tortoise_recon
          coverage_name: tortoise_recon

  Recon_DSI_Studio_GQI:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: dsi_studio_gqi_recon
          coverage_name: dsi_studio_gqi_recon

  Recon_DIPY_MAPMRI:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: dipy_mapmri
          coverage_name: dipy_mapmri

  Recon_DIPY_DKI:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: dipy_dki
          coverage_name: dipy_dki

  Recon_AMICO:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: amico_noddi
          coverage_name: amico_noddi

  mrtrix3_recon_with_response_functions:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: mrtrix3_recon_with_response_functions
          coverage_name: mrtrix3_recon_with_response_functions

  Recon_PYAFQ:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: pyafq_recon_full
          coverage_name: pyafq_recon_full

  Recon_PYAFQExternalTrk:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: pyafq_recon_external_trk
          coverage_name: pyafq_recon_external_trk

  Recon_ScalarMap:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_build_and_data
      - run_integration_test:
          marker: scalar_mapper
          coverage_name: scalar_mapper

  merge_coverage:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - attach_workspace:
          at: /tmp/coverage
      - run:
          name: Merge coverage files
          command: |
            pyenv local 3
            pip install coverage
            cd /tmp/src/qsirecon
            coverage combine /tmp/coverage/
            coverage xml -o /tmp/coverage/coverage.xml
      - store_artifacts:
          path: /tmp/coverage
      - codecov/upload:
          file: /tmp/coverage/coverage.xml

  deployable:
    docker:
      - image: busybox:latest
    steps:
      - run: echo Deploying!

  deploy_docker:
    <<: *machine_defaults
    environment:
      TZ: "/usr/share/zoneinfo/America/New_York"
      DOCKER_BUILDKIT: "1"
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_cache:
          keys:
            - build-v4-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}-{{ .Revision }}
      - run: *docker_auth
      - run:
          name: Build production image
          no_output_timeout: 3h
          command: |
            if [[ -n "$CIRCLE_TAG" ]]; then THISVERSION="$CIRCLE_TAG"; else THISVERSION="0+build"; fi
            e=1 && for i in {1..5}; do
              docker build \
                --target qsirecon \
                --rm=false \
                -t pennlinc/qsirecon:latest \
                --platform linux/amd64 \
                --build-arg BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
                --build-arg VCS_REF="$(git rev-parse --short HEAD)" \
                --build-arg VERSION="$THISVERSION" . \
              && e=0 && break || sleep 15
            done && [ "$e" -eq "0" ]
      - run:
          name: Verify production image
          command: docker run --rm pennlinc/qsirecon:latest --version
      - run:
          name: Deploy to Docker Hub
          no_output_timeout: 40m
          command: |
            if [[ -n "$DOCKERHUB_TOKEN" ]]; then
              docker tag pennlinc/qsirecon:latest pennlinc/qsirecon:unstable
              docker push pennlinc/qsirecon:unstable
              if [[ -n "$CIRCLE_TAG" ]]; then
                docker tag pennlinc/qsirecon:latest pennlinc/qsirecon:$CIRCLE_TAG
                docker push pennlinc/qsirecon:latest
                docker push pennlinc/qsirecon:$CIRCLE_TAG
              fi
            fi

workflows:
  version: 2
  build_test_deploy:
    jobs:
      - image_prep:
          filters:
            tags:
              only: /.*/
      - get_data:
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/
      - Recon_3Tissue_Singleshell_ACT:
          requires: [image_prep, get_data]
      - Recon_SS3T_FOD_AutoTrack:
          requires: [image_prep, get_data]
      - Recon_msmt_Multishell_HSVS:
          requires: [image_prep, get_data]
      - Recon_multises_pre1_IO_test:
          requires: [image_prep, get_data]
      - Recon_multises_post1_IO_test:
          requires: [image_prep, get_data]
      - Recon_3Tissue_Singleshell_NoACT:
          requires: [image_prep, get_data]
      - Recon_MRtrix3:
          requires: [image_prep, get_data]
      - Recon_Interfaces:
          requires: [image_prep, get_data]
      - Recon_AutoTrack:
          requires: [image_prep, get_data]
      - Recon_Tortoise:
          requires: [image_prep, get_data]
      - Recon_DSI_Studio_GQI:
          requires: [image_prep, get_data]
      - Recon_DIPY_MAPMRI:
          requires: [image_prep, get_data]
      - Recon_DIPY_DKI:
          requires: [image_prep, get_data]
      - Recon_AMICO:
          requires: [image_prep, get_data]
      - mrtrix3_recon_with_response_functions:
          requires: [image_prep, get_data]
      - Recon_PYAFQ:
          requires: [image_prep, get_data]
      - Recon_PYAFQExternalTrk:
          requires: [image_prep, get_data]
      - Recon_ScalarMap:
          requires: [image_prep, get_data]
      - merge_coverage:
          requires:
            - Recon_3Tissue_Singleshell_ACT
            - Recon_3Tissue_Singleshell_NoACT
            - Recon_SS3T_FOD_AutoTrack
            - Recon_MRtrix3
            - Recon_Interfaces
            - Recon_AutoTrack
            - Recon_Tortoise
            - Recon_DSI_Studio_GQI
            - Recon_DIPY_MAPMRI
            - Recon_DIPY_DKI
            - Recon_AMICO
            - mrtrix3_recon_with_response_functions
            - Recon_PYAFQ
            - Recon_PYAFQExternalTrk
            - Recon_ScalarMap
            - Recon_multises_pre1_IO_test
            - Recon_multises_post1_IO_test
            - Recon_msmt_Multishell_HSVS
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/
      - deployable:
          requires:
            - image_prep
            - Recon_3Tissue_Singleshell_ACT
            - Recon_3Tissue_Singleshell_NoACT
            - Recon_SS3T_FOD_AutoTrack
            - Recon_MRtrix3
            - Recon_Interfaces
            - Recon_AutoTrack
            - Recon_Tortoise
            - Recon_DSI_Studio_GQI
            - Recon_DIPY_MAPMRI
            - Recon_DIPY_DKI
            - Recon_AMICO
            - mrtrix3_recon_with_response_functions
            - Recon_PYAFQ
            - Recon_PYAFQExternalTrk
            - Recon_ScalarMap
            - Recon_multises_pre1_IO_test
            - Recon_multises_post1_IO_test
            - Recon_msmt_Multishell_HSVS
          filters:
            branches:
              only: main
            tags:
              only: /.*/
      - deploy_docker:
          requires: [deployable]
          filters:
            branches:
              only: main
            tags:
              only: /.*/
