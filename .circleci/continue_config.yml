version: 2.1

parameters:
  has_any_changes:
    type: boolean
    default: false
  has_code_changes:
    type: boolean
    default: false

orbs:
  codecov: codecov/codecov@4.1.0

_machine_defaults: &machine_defaults
  environment:
    TZ: "/usr/share/zoneinfo/America/New_York"
  machine:
    image: default
  working_directory: /tmp/src/qsirecon
  resource_class: large

_machine_with_dlc: &machine_with_dlc
  environment:
    TZ: "/usr/share/zoneinfo/America/New_York"
  machine:
    image: default
    docker_layer_caching: true
  working_directory: /tmp/src/qsirecon
  resource_class: large

_default_filters: &default_filters
  tags:
    ignore: /.*/

_tag_filters: &tag_filters
  tags:
    only: /.*/
  branches:
    ignore: /.*/

_docker_auth: &docker_auth
  name: Docker authentication
  command: |
    if [[ -n "$DOCKER_PASS" ]]; then
      echo "$DOCKER_PASS" | docker login -u $DOCKER_USER --password-stdin
    fi

_setup_docker_registry: &setup_docker_registry
  name: Set up local Docker registry
  command: |
    docker pull registry:2
    docker run -d -p 5000:5000 --restart=always --name=registry \
        -v /tmp/docker:/var/lib/registry registry:2

_pull_test_image: &pull_test_image
  name: Pull and tag test image from local registry
  command: |
    docker pull localhost:5000/qsirecon-test
    docker tag localhost:5000/qsirecon-test pennlinc/qsirecon:test

commands:
  restore_build_and_data:
    description: Restore Docker image cache and test data cache, then start the registry
    steps:
      - restore_cache:
          keys:
            - build-v4-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}
      - restore_cache:
          keys:
            - data-v3-{{ checksum ".circleci/data_versions.txt" }}
      - run: *docker_auth
      - run: *setup_docker_registry
      - run: *pull_test_image

  run_integration_test:
    description: Run a pytest-marked integration test inside the test Docker image
    parameters:
      marker:
        type: string
      cpus:
        type: integer
        default: 4
    steps:
      - run:
          name: Run qsirecon (<< parameters.marker >>)
          no_output_timeout: 1h
          command: |
            mkdir -p /tmp/out /tmp/work /tmp/coverage
            docker run --rm=false \
              -e CIRCLE_CPUS=<< parameters.cpus >> \
              -e COVERAGE_FILE=/coverage/.coverage.<< parameters.marker >> \
              -v /tmp/src/qsirecon:/tmp/src/qsirecon:ro \
              -v /tmp/data:/data:ro \
              -v /tmp/out:/out \
              -v /tmp/work:/work \
              -v /tmp/coverage:/coverage \
              -w /tmp/src/qsirecon \
              --entrypoint pytest \
              pennlinc/qsirecon:test \
              --strict-markers --strict-config \
              -rP -o log_cli=true -m "<< parameters.marker >>" \
              --cov-append --cov-report term-missing --cov=qsirecon \
              --data_dir=/data --output_dir=/out --working_dir=/work \
              qsirecon
      - run:
          name: Prune non-QC artifacts
          when: always
          command: |
            find /tmp/out/ -name "*.nii.gz" -type f -delete 2>/dev/null || true
            find /tmp/out/ \( \
              -name "*.h5" -o -name "*.gii" -o -name "*.gii.gz" -o \
              -name "*.mat" -o -name "*.npz" -o -name "*.mgz" -o -name "*.mif" \
            \) -type f -delete 2>/dev/null || true
            find /tmp/out/ \( -name ".pytest_cache" -o -name "__pycache__" \) -type d \
              -exec rm -rf {} + 2>/dev/null || true
      - store_artifacts:
          path: /tmp/out
      - persist_to_workspace:
          root: /tmp/coverage
          paths:
            - .coverage.<< parameters.marker >>

jobs:
  image_prep:
    <<: *machine_with_dlc
    environment:
      TZ: "/usr/share/zoneinfo/America/New_York"
      DOCKER_BUILDKIT: "1"
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_cache:
          keys:
            - build-v4-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}
      - run: *docker_auth
      - run: *setup_docker_registry
      - run:
          name: Get base image information
          command: |
            export BASE_IMAGE=$( grep "BASE_IMAGE=" Dockerfile | head -1 | cut -d= -f2 )
            export BASE_IMAGE_NAME=${BASE_IMAGE%:*}
            export BASE_TAG=${BASE_IMAGE#*:}
            echo "BASE_IMAGE=$BASE_IMAGE" >> $BASH_ENV
            echo "BASE_IMAGE_NAME=$BASE_IMAGE_NAME" >> $BASH_ENV
            echo "BASE_TAG=$BASE_TAG" >> $BASH_ENV
      - run:
          name: Determine whether test image build is required
          command: |
            if [[ -f /tmp/images/imageprep-success.marker ]]; then
              echo "BUILD_TEST_IMAGE=0" >> "$BASH_ENV"
            else
              echo "No successful cached image prep for current Docker inputs; rebuilding test image."
              echo "BUILD_TEST_IMAGE=1" >> "$BASH_ENV"
            fi
      - run:
          name: Build base Docker image if needed
          no_output_timeout: 90m
          command: |
            if ! docker manifest inspect $BASE_IMAGE > /dev/null 2>&1; then
              echo "Base image $BASE_IMAGE not found, building..."
              docker build -f Dockerfile.base \
                --platform linux/amd64 \
                -t $BASE_IMAGE \
                -t $BASE_IMAGE_NAME:latest .
              echo "BASE_WAS_BUILT=1" >> "$BASH_ENV"
            else
              echo "Base image $BASE_IMAGE already exists."
              echo "BASE_WAS_BUILT=0" >> "$BASH_ENV"
            fi
      - run:
          name: Build test Docker image if needed
          no_output_timeout: 90m
          command: |
            if [[ "$BUILD_TEST_IMAGE" == "1" || "$BASE_WAS_BUILT" == "1" ]]; then
              docker build \
                --target test \
                --rm=false \
                -t pennlinc/qsirecon:test \
                --platform linux/amd64 \
                --build-arg VCS_REF="$(git rev-parse --short HEAD)" .
            elif docker image inspect pennlinc/qsirecon:test > /dev/null 2>&1; then
              echo "Reusing existing local test image (no Dockerfile/pixi/base-triggered rebuild required)."
            elif docker pull localhost:5000/qsirecon-test; then
              docker tag localhost:5000/qsirecon-test pennlinc/qsirecon:test
              echo "Reusing cached test image from local registry (no Dockerfile/pixi/base-triggered rebuild required)."
            else
              echo "No reusable test image found; rebuilding test image."
              docker build \
                --target test \
                --rm=false \
                -t pennlinc/qsirecon:test \
                --platform linux/amd64 \
                --build-arg VCS_REF="$(git rev-parse --short HEAD)" .
            fi
      - run:
          name: Guard test image revision
          command: |
            if [[ "$BUILD_TEST_IMAGE" == "0" ]]; then
              echo "Test image reused from cache (Docker deps unchanged); skipping revision guard."
              exit 0
            fi
            EXPECTED_REF="$(git rev-parse --short HEAD)"
            IMAGE_REF="$(docker image inspect pennlinc/qsirecon:test --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
            echo "Expected test image ref: ${EXPECTED_REF}"
            echo "Actual test image ref: ${IMAGE_REF:-<missing>}"
            if [[ -z "$IMAGE_REF" || "$IMAGE_REF" != "$EXPECTED_REF" ]]; then
              echo "Test image revision does not match checkout. Refusing to run tests with stale image."
              exit 1
            fi
      - run:
          name: Verify test image
          command: docker run --rm --entrypoint pytest pennlinc/qsirecon:test --version
      - run:
          name: Build production Docker image
          no_output_timeout: 90m
          command: |
            if [[ "$CIRCLE_BRANCH" != "main" && -z "$CIRCLE_TAG" ]]; then
              echo "PR branch; skipping production image build."
              echo "BUILD_PRODUCTION_IMAGE=0" >> "$BASH_ENV"
              exit 0
            fi
            echo "BUILD_PRODUCTION_IMAGE=1" >> "$BASH_ENV"
            if [[ -n "$CIRCLE_TAG" ]]; then
              THISVERSION="$CIRCLE_TAG"
            else
              THISVERSION="0+build"
            fi
            e=1 && for i in {1..5}; do
              docker build \
                --target qsirecon \
                --rm=false \
                -t pennlinc/qsirecon:latest \
                --platform linux/amd64 \
                --build-arg BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
                --build-arg VCS_REF="$(git rev-parse --short HEAD)" \
                --build-arg VERSION="$THISVERSION" . \
              && e=0 && break || sleep 15
            done && [ "$e" -eq "0" ]
      - run:
          name: Verify production image
          command: |
            if [[ "$BUILD_PRODUCTION_IMAGE" != "1" ]]; then
              echo "Production image not built on this branch; skipping verify."
              exit 0
            fi
            docker run --rm pennlinc/qsirecon:latest --version
      - run:
          name: Push base image to Docker Hub (if newly built)
          command: |
            if [[ "$BASE_WAS_BUILT" == "1" ]] && docker image inspect $BASE_IMAGE > /dev/null 2>&1; then
              if [[ -n "$DOCKER_PASS" ]]; then
                docker push $BASE_IMAGE
                docker push $BASE_IMAGE_NAME:latest
              fi
            fi
      - run:
          name: Push test image to local registry
          no_output_timeout: 40m
          command: |
            docker tag pennlinc/qsirecon:test localhost:5000/qsirecon-test
            docker push localhost:5000/qsirecon-test
      - run:
          name: Push production image to Docker Hub
          no_output_timeout: 40m
          command: |
            if [[ "$BUILD_PRODUCTION_IMAGE" != "1" ]]; then
              echo "PR branch; skipping production image push."
              exit 0
            fi
            if [[ -n "$DOCKER_PASS" ]]; then
              docker tag pennlinc/qsirecon:latest pennlinc/qsirecon:unstable
              docker push pennlinc/qsirecon:unstable
              if [[ -n "$CIRCLE_TAG" ]]; then
                docker tag pennlinc/qsirecon:latest pennlinc/qsirecon:$CIRCLE_TAG
                docker push pennlinc/qsirecon:latest
                docker push pennlinc/qsirecon:$CIRCLE_TAG
              fi
            fi
      - run:
          name: Docker registry garbage collection
          command: |
            docker exec registry /bin/registry garbage-collect --delete-untagged \
              /etc/docker/registry/config.yml
      - run:
          name: Record successful image prep
          command: |
            mkdir -p /tmp/images
            touch /tmp/images/imageprep-success.marker
      - save_cache:
          key: build-v4-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}
          paths:
            - /tmp/docker
            - /tmp/images

  get_data:
    docker:
      - image: cimg/base:stable
    working_directory: /tmp/src/qsirecon
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - restore_cache:
          keys:
            - data-v3-{{ checksum ".circleci/data_versions.txt" }}
      - run:
          name: Load data URLs
          command: |
            set -a
            . /tmp/src/qsirecon/.circleci/data_versions.txt
            set +a
            echo "export MULTISHELL_OUTPUT_URL=$MULTISHELL_OUTPUT_URL" >> "$BASH_ENV"
            echo "export SINGLESHELL_OUTPUT_URL=$SINGLESHELL_OUTPUT_URL" >> "$BASH_ENV"
            echo "export HSVS_DATA_URL=$HSVS_DATA_URL" >> "$BASH_ENV"
            echo "export MULTISES_PRE1_OUTPUT_URL=$MULTISES_PRE1_OUTPUT_URL" >> "$BASH_ENV"
            echo "export MULTISES_POST1_OUTPUT_URL=$MULTISES_POST1_OUTPUT_URL" >> "$BASH_ENV"
            echo "export CUSTOM_ATLASES_URL=$CUSTOM_ATLASES_URL" >> "$BASH_ENV"
      - run:
          name: Download integration datasets
          command: |
            download_one() {
              local dset=$1
              local url=$2
              if [[ -d /tmp/data/${dset} ]]; then
                echo "${dset} data was cached"
                return 0
              fi
              mkdir -p /tmp/data/${dset}
              if [[ "${url}" == *.xz ]]; then
                wget --retry-connrefused --waitretry=5 --read-timeout=20 --timeout=15 -t 0 -q \
                  -O /tmp/${dset}.tar.xz "${url}" || return 1
                tar xJf /tmp/${dset}.tar.xz -C /tmp/data/${dset}
                rm -f /tmp/${dset}.tar.xz
              elif [[ "${url}" == *.gz ]]; then
                wget --retry-connrefused --waitretry=5 --read-timeout=20 --timeout=15 -t 0 -q \
                  -O /tmp/${dset}.tar.gz "${url}" || return 1
                tar xzf /tmp/${dset}.tar.gz -C /tmp/data/${dset}
                rm -f /tmp/${dset}.tar.gz
              else
                echo "Unknown file extension for ${dset}: ${url}"
                return 1
              fi
              echo "Downloaded ${dset}"
            }
            download_one singleshell_output "$SINGLESHELL_OUTPUT_URL"
            download_one multishell_output "$MULTISHELL_OUTPUT_URL"
            download_one multises_pre1_output "$MULTISES_PRE1_OUTPUT_URL"
            download_one multises_post1_output "$MULTISES_POST1_OUTPUT_URL"
            download_one hsvs_data "$HSVS_DATA_URL"
            download_one custom_atlases "$CUSTOM_ATLASES_URL"
      - save_cache:
          key: data-v3-{{ checksum ".circleci/data_versions.txt" }}
          paths:
            - /tmp/data

  integration_test:
    <<: *machine_defaults
    parameters:
      marker:
        type: string
      cpus:
        type: integer
        default: 4
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - run:
          name: Check whether build should be skipped
          command: |
            if [[ "$( git log --format=oneline -n 1 $CIRCLE_SHA1 | grep -i -E '\[skip[ _]?<< parameters.marker >>\]' )" != "" ]]; then
              echo "Skipping << parameters.marker >>"
              circleci step halt
            fi
      - restore_build_and_data
      - run_integration_test:
          marker: << parameters.marker >>
          cpus: << parameters.cpus >>

  unit_tests:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - run:
          name: Check whether build should be skipped
          command: |
            if [[ "$( git log --format=oneline -n 1 $CIRCLE_SHA1 | grep -i -E '\[skip[ _]?unit_tests\]' )" != "" ]]; then
              echo "Skipping unit tests"
              circleci step halt
            fi
      - restore_build_and_data
      - run:
          name: Run pytest on tests directory
          no_output_timeout: 1h
          command: |
            mkdir -p /tmp/out /tmp/work /tmp/coverage
            docker run --rm=false \
              -e CIRCLE_CPUS=2 \
              -e COVERAGE_FILE=/coverage/.coverage.unit_tests \
              -v /tmp/src/qsirecon:/tmp/src/qsirecon:ro \
              -v /tmp/data:/data:ro \
              -v /tmp/out:/out \
              -v /tmp/work:/work \
              -v /tmp/coverage:/coverage \
              -w /tmp/src/qsirecon \
              --entrypoint pytest \
              pennlinc/qsirecon:test \
              --strict-markers --strict-config \
              --cov-append --cov-report term-missing --cov=qsirecon \
              --data_dir=/data --output_dir=/out --working_dir=/work \
              qsirecon/tests
      - persist_to_workspace:
          root: /tmp/coverage
          paths:
            - .coverage.unit_tests
      - store_artifacts:
          path: /tmp/out

  merge_coverage:
    docker:
      - image: cimg/python:3.12
    working_directory: /tmp/src/qsirecon
    steps:
      - checkout:
          path: /tmp/src/qsirecon
      - attach_workspace:
          at: /tmp/coverage
      - run:
          name: Merge coverage files
          command: |
            pip install coverage
            cd /tmp/src/qsirecon
            coverage combine /tmp/coverage/
            coverage xml -o /tmp/coverage/coverage.xml
      - store_artifacts:
          path: /tmp/coverage
      - run:
          name: Quick fix for GPG error in Codecov
          command: |
            mkdir -p /tmp/gnupg
            chmod 700 /tmp/gnupg
            echo 'export GNUPGHOME=/tmp/gnupg' >> "$BASH_ENV"
      - codecov/upload:
          file: /tmp/coverage/coverage.xml

workflows:
  version: 2

  run_tests:
    when: << pipeline.parameters.has_code_changes >>
    jobs:
      - image_prep:
          filters: *default_filters

      - get_data:
          filters: *default_filters

      - integration_test:
          name: << matrix.marker >>
          matrix:
            parameters:
              marker:
                - mrtrix_singleshell_ss3t_act
                - ss3t_fod_autotrack
                - mrtrix_multishell_msmt_hsvs
                - multises_pre1_qsiprep
                - multises_post1_qsiprep
                - mrtrix_singleshell_ss3t_noact
                - mrtrix3_recon
                - autotrack
                - tortoise_recon
                - dsi_studio_gqi_recon
                - dipy_mapmri
                - dipy_dki
                - amico_noddi
                - mrtrix3_recon_with_response_functions
                - pyafq_recon_full
                - pyafq_recon_external_trk
                - scalar_mapper
          requires: [image_prep, get_data]
          filters: *default_filters

      - unit_tests:
          requires:
            - image_prep
            - get_data
          filters: *default_filters

      - merge_coverage:
          requires:
            - mrtrix_singleshell_ss3t_act
            - ss3t_fod_autotrack
            - mrtrix_multishell_msmt_hsvs
            - multises_pre1_qsiprep
            - multises_post1_qsiprep
            - mrtrix_singleshell_ss3t_noact
            - mrtrix3_recon
            - autotrack
            - tortoise_recon
            - dsi_studio_gqi_recon
            - dipy_mapmri
            - dipy_dki
            - amico_noddi
            - mrtrix3_recon_with_response_functions
            - pyafq_recon_full
            - pyafq_recon_external_trk
            - scalar_mapper
            - unit_tests
          filters: *default_filters

  deploy:
    jobs:
      - image_prep:
          filters: *tag_filters
